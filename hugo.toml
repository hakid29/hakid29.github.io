baseURL = 'https://hakid29.github.io/'
languageCode = 'ko-kr'
title = 'hakid29'

[pagination]
  pagerSize = 5

[markup]
  [markup.highlight]
    noClasses = false

[params]
  contentTypeName = 'posts'
  showMenuItems = 2
  fullWidthTheme = false
  centerTheme = false

[languages]
  [languages.en]
    title = 'hakid29'
    [languages.en.params]
      subtitle = 'Security notes and writeups'
      menuMore = 'Show more'
      readMore = 'Read more'
      readOtherPosts = 'Read other posts'

      [languages.en.params.logo]
        logoText = 'hakid29'
        logoHomeLink = '/'

    [languages.en.menu]
      [[languages.en.menu.main]]
        identifier = 'about'
        name = 'About'
        url = '/about'

[module]
[[module.imports]]
  path = 'github.com/panr/hugo-theme-terminal/v4'
